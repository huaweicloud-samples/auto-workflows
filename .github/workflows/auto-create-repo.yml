name: Auto create public sample repository

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  authorize_approval:
    name: Authorize organization owner approval
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.authorization.outputs.authorized }}
    env:
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
      ISSUE_TOKEN: ${{ github.token }}
      ORG_NAME: ${{ github.repository_owner }}
    steps:
      - name: Checkout automation
        uses: actions/checkout@v4

      - name: Verify organization owner approval
        id: authorization
        run: |
          authorized="$(python -m scripts.authorize_repo_approval)"
          echo "authorized=$authorized" >> "$GITHUB_OUTPUT"

  create-repo:
    needs: authorize_approval
    if: needs.authorize_approval.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
      ISSUE_TOKEN: ${{ github.token }}
      ORG_NAME: ${{ github.repository_owner }}
      INDEX_REPO: awesome-huaweicloud
      APPROVALS_REQUIRED: "3"
      DEFAULT_CI_CONTEXT: ci
    steps:
      - name: Checkout automation
        uses: actions/checkout@v4

      - name: Create repository from approved issue
        run: |
          python scripts/create_repo_from_issue.py
